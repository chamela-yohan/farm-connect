<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .header { background-color: #27ae60; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .details { background-color: #f9f9f9; padding: 15px; border-radius: 4px; margin: 15px 0; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #27ae60; color: white; text-decoration: none; border-radius: 4px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>🌾 New Booking Request</h2></div>
    <p>Hello <strong th:text="${farmerName}">Farmer</strong>,</p>
    <p>You have received a new booking request for <strong th:text="${productTitle}">Product</strong>.</p>

    <div class="details">
        <p><strong>Customer:</strong> <span th:text="${buyerName}">Buyer</span></p>
        <p><strong>Dates:</strong> <span th:text="${startDate}">Start</span> to <span th:text="${endDate}">End</span> (<span th:text="${totalDays}">X</span> days)</p>
        <p><strong>Quantity:</strong> <span th:text="${quantity}">1</span></p>
        <p><strong>Estimated Total:</strong> LKR <span th:text="${totalAmount}">0.00</span></p>
        <p th:if="${buyerNotes}"><strong>Buyer Note:</strong> <em th:text="${buyerNotes}">Note</em></p>
    </div>

    <p>Please log in to your FarmConnect dashboard to Accept or Reject this request.</p>
    <a href="http://localhost:3000/en/farmer/bookings" class="btn">Manage Bookings</a>
</div>
</body>
</html>
