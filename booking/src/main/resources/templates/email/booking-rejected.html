<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .header { background-color: #e74c3c; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .details { background-color: #f9f9f9; padding: 15px; border-radius: 4px; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>❌ Booking Declined</h2></div>
    <p>Hello <strong th:text="${buyerName}">Buyer</strong>,</p>
    <p>We're sorry, but your booking request for <strong th:text="${productTitle}">Product</strong> has been declined by the farmer.</p>

    <div class="details">
        <p><strong>Dates Requested:</strong> <span th:text="${startDate}">Start</span> to <span th:text="${endDate}">End</span></p>
        <p><strong>Reason:</strong> <em th:text="${rejectionReason}">No reason provided</em></p>
    </div>

    <p>Please feel free to browse other available equipment or services on FarmConnect.</p>
</div>
</body>
</html>
