# SERVER & APP CONFIG (Safe to commit)
server.port=8080
spring.application.name=farmconnect-backend

# DATABASE (Using Placeholders)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/farmconnect_db}
spring.datasource.username=${DB_USERNAME:farmuser}
spring.datasource.password=${DB_PASSWORD:changeme_in_production}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MINIO (Using Placeholders)
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:changeme_in_production}
app.minio.bucket-name=farmconnect-products

# MinIO / S3 Configuration
cloud.aws.s3.bucket=farmconnect-products
cloud.aws.region=us-east-1
cloud.aws.credentials.access-key=${MINIO_ACCESS_KEY:minioadmin}
cloud.aws.credentials.secret-key=${MINIO_SECRET_KEY:changeme_in_production}
cloud.aws.endpoint=http://localhost:9000
cloud.aws.path-style-access-enabled=true

# JWT & SECURITY (Using Placeholders)
# Generate a real 256-bit secret for production and pass it via ENV VAR
app.jwt.secret=${JWT_SECRET:default_dev_secret_do_not_use_in_prod}
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000


# GOOGLE OAUTH (Using Placeholders)
app.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id_here}


# FILE UPLOAD LIMITS
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB


# EMAIL CONFIGURATION (Spring Mail)

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# CORS & WEBSOCKET ORIGINS
# Comma-separated list of allowed frontend URLs
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://farmconnect.lk}